<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;

        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: blue;
        }
        a:hover{
            text-decoration: underline;
            color: black;
        }
        a:active{
            color: blue;
        }
        a::before{
            content: '\21D2';
        }
        a::after{
            content: ' [Link]\21D0';
            text-decoration: none;
            font-weight: normal;
            color: blueviolet;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https//gustavoguanabara.github.io">Repositório GitHub</a></li>
        <li><a href="https//youtube.comcursoemvideo/">Canal Youtube</a></li>
        <li><a href="https//www.cursoemvideo.com">Site do curso</a></li>
    </ul>
</body>
</html>
