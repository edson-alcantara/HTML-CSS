<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Testando Formulário</h1>
    <form action="cadastro.js" method="get" autocomplete="on">
    <fieldset>
        <legend>Dados Pessoais</legend>
        <p>
            <label for="name">Nome</label>
            <input type="text" name="nome" id="nome" placeholder="Digite seu nome..." minlength="5" maxlength="15">
        </p>
        <p>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required autocomplete="email" placeholder="Digite seu email...">
        </p>
        <p>
            <label for="telefone">Telefone</label>
            <input type="tel" name="telefone" id="telefone" autocomplete="tel" required pattern="^([0-9]{2})[0-9]{4,5}-[0-9]{4}$" placeholder=" (xx)xxxxx-xxxx">
        </p>
    </fieldset>
    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">
    </form>
</body>
</html>
