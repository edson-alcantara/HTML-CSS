<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servido.</p>
    <video controls width="560" loop>
        <source src="meuvideo/meu.video.mp4.mp4" type="video/mp4">
        <source src="meuvideo/meu.video.webm.webm" type="video/webm">
        <source src="meuvideo/meu.video1.mp4.mp4" type="video/mp4">
        <p>Seu navegador não tem compatibilidade com o video.</p>
    </video>
    <h1>Inserindo videos do youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/i7L19SOqbNM?si=hhN5cZzbgCJSKWwi" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
